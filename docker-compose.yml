services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-booking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booking}
      POSTGRES_DB: ${POSTGRES_DB:-booking}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  api:
    build: .
    command: ["api"]
    # .env опционален — стек поднимется и без него.
    # Если файл создан (cp .env.example .env), его значения переопределят дефолты.
    env_file:
      - path: .env
        required: false
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RATE_LIMIT_CREATE: ${RATE_LIMIT_CREATE:-10/minute}
      POSTGRES_USER: ${POSTGRES_USER:-booking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booking}
      POSTGRES_DB: ${POSTGRES_DB:-booking}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      WORKER_FAILURE_RATE: ${WORKER_FAILURE_RATE:-0.15}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-3}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build: .
    command: ["worker"]
    env_file:
      - path: .env
        required: false
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_USER: ${POSTGRES_USER:-booking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booking}
      POSTGRES_DB: ${POSTGRES_DB:-booking}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      WORKER_FAILURE_RATE: ${WORKER_FAILURE_RATE:-0.15}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-3}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data:
